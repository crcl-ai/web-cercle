<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Capsule • Make something beautiful</title>
    <!-- Favicon & Touch Icons -->
    <link rel="icon" type="image/png" href="photos/favicon.png">
    <link rel="apple-touch-icon" href="photos/apple-touch-icon.png">
    
    <!-- Google Fonts for UI metadata -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- GSAP Animation Engine -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        /* --- BRAND FONTS: APPLE GARAMOND LIGHT & LIGHT ITALIC --- */
        @font-face {
            font-family: 'Apple Garamond Light';
            src: url('apple_garamond/AppleGaramond-Light.ttf') format('truetype');
            font-weight: 300;
            font-style: normal;
        }
        @font-face {
            font-family: 'Apple Garamond Light';
            src: url('apple_garamond/AppleGaramond-LightItalic.ttf') format('truetype');
            font-weight: 300;
            font-style: italic;
        }

        /* --- SYSTEM DESIGN TOKENS (#FAFAF8 LIGHT MODE) --- */
        :root {
            --bg-cream: #FAFAF8;
            --text-primary: #000000;
            --text-secondary: rgba(0, 0, 0, 0.65);
            --text-tertiary: rgba(0, 0, 0, 0.4);
            --accent-blue: #0A84FF;
            --card-border: rgba(0, 0, 0, 0.12);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        body {
            background-color: var(--bg-cream);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* --- TOP HEADER --- */
        .app-header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            padding: 32px 48px;
            display: flex;
            justify-content: flex-end; /* Top trailing edge only */
            align-items: center;
            z-index: 50;
            pointer-events: none;
        }

        .get-btn {
            pointer-events: auto;
            background: var(--accent-blue);
            color: #FFFFFF;
            text-decoration: none;
            border-radius: 9999px;
            padding: 8px 26px;
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: -0.01em;
            box-shadow: 0 4px 20px rgba(10, 132, 255, 0.3);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .get-btn:hover {
            transform: scale(1.06) translateY(-1px);
            background: #1D8FFF;
            box-shadow: 0 8px 28px rgba(10, 132, 255, 0.5);
        }

        .get-btn:active {
            transform: scale(0.98);
        }

        /* --- MASTER LAYOUT SHELL --- */
        .viewport-shell {
            width: 100vw;
            height: 100vh;
            display: flex;
            position: relative;
            z-index: 10;
        }

        /* --- HERO TEXT SECTION --- */
        .hero-section {
            display: flex;
            flex-direction: column;
            justify-content: center;
            z-index: 20;
            pointer-events: none;
        }

        .title-capsule {
            font-family: 'Apple Garamond Light', Georgia, serif;
            font-weight: 300;
            color: var(--text-primary);
            line-height: 0.9;
            letter-spacing: -0.02em;
        }

        .title-wonderful {
            font-family: 'Apple Garamond Light', Georgia, serif;
            font-weight: 300;
            color: var(--text-secondary);
            line-height: 1.1;
        }

        .title-wonderful em {
            font-family: 'Apple Garamond Light', Georgia, serif;
            font-style: italic;
            font-weight: 300;
            color: var(--text-primary);
        }

        /* --- RIGHT / TRAILING INTERACTIVE STAGE --- */
        .interactive-stage {
            position: absolute;
            right: 0;
            top: 0;
            width: 50vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1200px;
            z-index: 15;
        }

        /* Fixed Hitbox Wrapper matching Card Occupancy Space */
        .card-hitbox {
            width: 340px;
            height: 450px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 10;
        }

        /* --- FLOATING UNIVERSE MASTER CONTAINER (Spans Full 100vw x 100vh) --- */
        #universe-stage {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 30;
        }

        /* --- EXACT MIRROR IMAGE COLLECTION COVER CARD (Pure CSS) --- */
        .collection-cover-card {
            width: 330px;
            height: 440px; /* Exact 3:4 aspect ratio */
            background: #FFFFFF;
            border-radius: 20px; /* ~16.18 continuous */
            border: 1.5px solid var(--card-border);
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.08), 0 4px 16px rgba(0, 0, 0, 0.04);
            padding: 26px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
            will-change: transform, opacity;
        }

        .collection-cover-card:hover {
            box-shadow: 0 32px 80px rgba(10, 132, 255, 0.16), 0 8px 24px rgba(0, 0, 0, 0.06);
            border-color: rgba(10, 132, 255, 0.4);
        }

        .card-top {
            display: flex;
            justify-content: flex-start;
        }

        .eyebrow {
            font-size: 11.5px;
            font-weight: 700;
            color: rgba(0, 0, 0, 0.45);
            letter-spacing: 0.16em;
            text-transform: uppercase;
        }

        /* Center 3 Fanned Polaroids */
        .polaroid-stack {
            position: relative;
            width: 100%;
            height: 220px;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        .cover-polaroid {
            position: absolute;
            width: 142px;
            background: #FFFFFF;
            border-radius: 12px;
            border: 1px solid rgba(0, 0, 0, 0.12);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.14);
            padding: 10px;
            display: flex;
            flex-direction: column;
            will-change: transform;
        }

        .cover-polaroid .p-thumb {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 6px;
            overflow: hidden;
            background: #F0F0EE;
        }

        .cover-polaroid .p-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .cover-polaroid .p-title {
            font-size: 11px;
            font-weight: 700;
            color: #000000;
            margin-top: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .cover-polaroid .p-sub {
            font-size: 9.5px;
            font-weight: 500;
            color: rgba(0, 0, 0, 0.46);
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .cover-polaroid.p2 { transform: rotate(-8deg) translate(-26px, 14px); z-index: 1; }
        .cover-polaroid.p1 { transform: rotate(6deg) translate(26px, -4px); z-index: 2; }
        .cover-polaroid.p0 { transform: rotate(-2deg) translate(0px, 2px); z-index: 3; }

        /* Bottom Bar */
        .card-bottom {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .collection-title {
            font-family: 'Apple Garamond Light', Georgia, serif;
            font-size: 38px;
            font-weight: 300;
            color: #000000;
            line-height: 1.0;
        }

        .collection-attr {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 10.5px;
            font-weight: 700;
            color: rgba(0, 0, 0, 0.38);
            letter-spacing: 0.1em;
        }

        /* --- FLOATING UNIVERSE ITEMS (Exact FloatingItemBubble Styling) --- */
        .universe-item {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transform: translate3d(-9999px, -9999px, 0) scale(0.01);
            z-index: 5;
            will-change: transform, opacity;
        }

        /* Artwork Box */
        .universe-thumb {
            position: relative;
            overflow: hidden;
            background: #F0F0EE;
            box-shadow: 0 16px 36px rgba(0, 0, 0, 0.14), 0 4px 12px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.7);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s ease, border-color 0.3s ease;
        }

        .universe-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Labels Centered Below Bubble */
        .universe-labels {
            margin-top: 8px;
            text-align: center;
            pointer-events: none;
        }

        .u-title {
            font-size: 12.5px;
            font-weight: 600;
            color: #000000;
            line-height: 1.25;
            max-width: 140px;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .u-sub {
            font-size: 10.5px;
            font-weight: 400;
            color: rgba(0, 0, 0, 0.55);
            margin-top: 2px;
            max-width: 140px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* --- THING TYPE GEOMETRY SPECIFICATIONS (FloatingItemBubble lines 164-194) --- */
        .universe-thumb.type-music { width: 134px; height: 134px; border-radius: 8px; }
        .universe-thumb.type-link, .universe-thumb.type-video { width: 196px; height: 112px; border-radius: 12px; }
        .universe-thumb.type-book { width: 112px; height: 168px; border-radius: 4px; }
        .universe-thumb.type-photo { width: 126px; height: 168px; border-radius: 12px; }
        .universe-thumb.type-spot { width: 98px; height: 98px; border-radius: 50%; }

        .universe-thumb.type-note {
            width: 140px;
            height: 140px;
            background: #FFFFFF;
            border-radius: 16.18px;
            padding: 14px;
            display: flex;
            align-items: flex-start;
            border: 1.5px solid rgba(0, 0, 0, 0.12);
        }

        .note-content {
            font-size: 13.5px;
            font-weight: 600;
            color: #000000;
            letter-spacing: -0.02em;
            line-height: 1.35;
            text-align: left;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 6;
            -webkit-box-orient: vertical;
        }

        /* --- SIMPLE TEXT FOOTER (WEB DESKTOP ONLY) --- */
        .web-footer {
            position: absolute;
            bottom: 32px;
            left: 8vw;
            display: flex;
            gap: 28px;
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
            font-size: 13.5px;
            font-weight: 600;
            letter-spacing: 0.03em;
            text-transform: lowercase;
            pointer-events: auto;
            z-index: 50;
        }
        .web-footer a {
            color: rgba(0, 0, 0, 0.55);
            text-decoration: none;
            transition: color 0.2s ease;
        }
        .web-footer a:hover {
            color: #000000;
        }

        /* --- DESKTOP SPECIFIC RULES (WEB > 1100px and Landscape) --- */
        @media (min-width: 1101px) and (orientation: landscape) {
            .hero-section { width: 48vw; padding-left: 8vw; }
            .title-capsule { font-size: clamp(4.8rem, 8vw, 9.5rem); }
            .title-wonderful { font-size: clamp(2.8rem, 4.4vw, 5.8rem); margin-top: 8px; }
        }

        /* --- MOBILE & TABLET PORTRAIT RULES (<= 1100px or Portrait) --- */
        @media (max-width: 1100px), (orientation: portrait) {
            .web-footer { display: none !important; }
            body { display: flex; flex-direction: column; }
            .app-header {
                position: relative;
                top: auto;
                left: auto;
                width: 100%;
                padding: 20px 24px 16px; /* Added generous bottom padding */
                flex-shrink: 0;
            }
            .viewport-shell {
                flex: 1;
                height: auto;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                gap: clamp(16px, 3.5vh, 26px);
                padding: clamp(8px, 2vh, 24px) 20px clamp(16px, 3.5vh, 32px);
            }
            .hero-section { display: contents; }
            .title-capsule { order: 1; text-align: center; width: 100%; font-size: clamp(2.8rem, 8.5vh, 5.2rem); }
            .interactive-stage {
                order: 2;
                position: relative;
                width: 100%;
                height: clamp(300px, 48vh, 450px);
                margin: 0;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .title-wonderful { order: 3; text-align: center; width: 100%; font-size: clamp(1.7rem, 5.2vh, 3.4rem); }
            .mob-br { display: inline; }
            
            .card-hitbox { width: 290px; height: 385px; }
            .collection-cover-card { width: 280px; height: 373.33px; padding: 22px; }
            .polaroid-stack { height: 180px; }
            .cover-polaroid { width: 120px; }
            .collection-title { font-size: 32px; }
        }

        /* --- COMPACT MOBILE HEIGHTS (iPhone SE 1st/2nd/3rd Gen) --- */
        @media (max-height: 700px) and ((max-width: 1100px) or (orientation: portrait)) {
            .interactive-stage { transform: scale(0.82); }
        }
        @media (max-height: 600px) and ((max-width: 1100px) or (orientation: portrait)) {
            .interactive-stage { transform: scale(0.68); }
            .app-header { padding: 14px 18px 10px; }
            .viewport-shell { padding: 4px 18px 12px; }
        }
    </style>

            { type: 'music', title: 'Romance', subtitle: 'Fontaines D.C.', img: 'photos/romance.jpg', desktop: { x: 0.86, y: 0.16 }, mobile: { x: 0.74, y: 0.26 } },
            { type: 'music', title: '360', subtitle: 'Charli xcx', img: 'photos/brat.jpg', desktop: { x: 0.88, y: 0.82 }, mobile: { x: 0.76, y: 0.74 } },
            { type: 'link', title: "Frank's Cafe Peckham", subtitle: 'boldtendencies.com', img: 'photos/concrete_summer.png', desktop: { x: 0.68, y: 0.85 }, mobile: { x: 0.50, y: 0.78 } },
            { type: 'spot', title: 'Jolene Bakery', subtitle: 'Newington Green', img: 'photos/jolene.jpg', desktop: { x: 0.54, y: 0.78 }, mobile: { x: 0.26, y: 0.74 } },
            { type: 'photo', title: "Richmond '26", subtitle: "Photo", img: 'photos/london.jpg', desktop: { x: 0.54, y: 0.45 }, mobile: { x: 0.24, y: 0.58 } },
            { type: 'music', title: 'Por Supuesto', subtitle: 'Marina Sena', img: 'photos/marina.jpg', desktop: { x: 0.72, y: 0.14 }, mobile: { x: 0.76, y: 0.40 } },
            { type: 'spot', title: "Sketch", subtitle: 'Mayfair', img: 'photos/sketch.jpg', desktop: { x: 0.64, y: 0.32 }, mobile: { x: 0.25, y: 0.42 } },
            { type: 'photo', title: "Devon Diaries", subtitle: "Photo", img: 'photos/paula.jpg', desktop: { x: 0.84, y: 0.46 }, mobile: { x: 0.50, y: 0.24 } },
            { type: 'spot', title: 'The Little Orange Door', subtitle: 'Clapham Common', img: 'photos/orange_door.jpg', desktop: { x: 0.72, y: 0.56 }, mobile: { x: 0.74, y: 0.58 } },
            { type: 'note', title: 'Note', subtitle: 'Bring a canvas tote bag, cheap sunglasses, and a picnic blanket for Hampstead Heath.', img: null, desktop: { x: 0.86, y: 0.68 }, mobile: { x: 0.56, y: 0.60 } },
            { type: 'spot', title: "Madison", subtitle: "St.Paul's", img: 'photos/madison.jpg', desktop: { x: 0.66, y: 0.68 }, mobile: { x: 0.42, y: 0.44 } }
        ];

        const stage = document.getElementById('stage');
        const universeStage = document.getElementById('universe-stage');
        const londonCard = document.getElementById('london-card');
        const hitbox = document.getElementById('hitbox');

        const itemNodes = [];

        // Generate the 12 Floating Universe DOM Nodes
        universeItemsData.forEach((item, idx) => {
            const el = document.createElement('div');
            el.className = 'universe-item';
            el.id = `u-node-${idx}`;

            let innerContent = '';
            if (item.type === 'note') {
                innerContent = `
                    <div class="universe-thumb type-note">
                        <div class="note-content">${item.subtitle}</div>
                    </div>
                `;
            } else {
                const subHtml = item.subtitle ? `<div class="u-sub">${item.subtitle}</div>` : '';
                innerContent = `
                    <div class="universe-thumb type-${item.type}">
                        <img src="${item.img}" alt="${item.title}">
                    </div>
                    <div class="universe-labels">
                        <div class="u-title">${item.title}</div>
                        ${subHtml}
                    </div>
                `;
            }

            el.innerHTML = innerContent;
            universeStage.appendChild(el);
            itemNodes.push(el);
        });

        // --- GLOBAL MOUSE & TOUCH TRACKING ---
        let globalMouseX = -9999;
        let globalMouseY = -9999;

        // --- RESPONSIVE LAYOUT HELPER ---
        function isMobileMode() {
            return window.innerWidth <= 1100 || window.innerHeight > window.innerWidth;
        }

        window.addEventListener('pointermove', (e) => {
            globalMouseX = e.clientX;
            globalMouseY = e.clientY;
            if (isMobileMode() || document.body.classList.contains('fission-active')) return;
            const tiltX = (window.innerWidth / 2 - e.clientX) / 45;
            const tiltY = (window.innerHeight / 2 - e.clientY) / 45;
            gsap.to(londonCard, { rotateY: -tiltX, rotateX: tiltY, duration: 0.8, ease: "power2.out" });
        });

        // --- CONFIGURE COORDS FOR MASTER VIEWPORT ---
        function getCardCenter() {
            const rect = londonCard.getBoundingClientRect();
            return { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
        }

        function configurePhysicsTargets() {
            const isDesktop = !isMobileMode();

            itemNodes.forEach((el, idx) => {
                const data = universeItemsData[idx];
                const layout = isDesktop ? data.desktop : data.mobile;
                const elW = el.offsetWidth || 135;
                const elH = el.offsetHeight || 170;

                el._radius = Math.max(elW, elH) / 2;
                el._targetScale = isDesktop ? 1 : 0.7;

                // Center anchored target coordinate
                el._targetX = layout.x * window.innerWidth - (elW / 2);
                el._targetY = layout.y * window.innerHeight - (elH / 2);

                el._freqX = 0.8 + Math.random() * 0.5;
                el._freqY = 0.8 + Math.random() * 0.5;
                el._phaseX = Math.random() * Math.PI * 2;
                el._phaseY = Math.random() * Math.PI * 2;
            });
        }

        // --- SUPER SOFT RELAXATION & THICK MEDIUM RIPPLE ENGINE ---
        let isFissioned = false;
        let entranceCompleted = false;

        function physicsLoop() {
            if (isFissioned && entranceCompleted) {
                const now = Date.now() * 0.001;
                const total = itemNodes.length;
                const isDesktop = !isMobileMode();

                itemNodes.forEach((el) => {
                    const driftX = Math.cos(now * el._freqX + el._phaseX) * 12;
                    const driftY = Math.sin(now * el._freqY + el._phaseY) * 12;
                    el._posX = el._targetX + driftX;
                    el._posY = el._targetY + driftY;
                });

                // Soft geometric relaxation
                for (let iter = 0; iter < 3; iter++) {
                    for (let i = 0; i < total; i++) {
                        const elA = itemNodes[i];
                        for (let j = i + 1; j < total; j++) {
                            const elB = itemNodes[j];
                            const dx = elB._posX - elA._posX;
                            const dy = elB._posY - elA._posY;
                            const dist = Math.sqrt(dx*dx + dy*dy);
                            const minDist = (elA._radius + elB._radius) + 16;

                            if (dist < minDist && dist > 0.1) {
                                const overlap = minDist - dist;
                                const nudge = overlap * 0.15;
                                const nx = dx / dist;
                                const ny = dy / dist;

                                elA._posX -= nx * nudge;
                                elA._posY -= ny * nudge;
                                elB._posX += nx * nudge;
                                elB._posY += ny * nudge;
                            }
                        }
                    }
                }

                // Strictly clamp X inside trailing 50% on Desktop & apply Fluid Medium Cursor Ripples
                const minAllowedX = isDesktop ? (window.innerWidth * 0.51) : 10;

                itemNodes.forEach((el) => {
                    el._posX = Math.max(minAllowedX, el._posX);

                    // Fluid medium cursor ripple displacement
                    const elW = el.offsetWidth || 135;
                    const elH = el.offsetHeight || 170;
                    const cX = el._renderX + elW / 2;
                    const cY = el._renderY + elH / 2;
                    const mdx = cX - globalMouseX;
                    const mdy = cY - globalMouseY;
                    const mDist = Math.sqrt(mdx*mdx + mdy*mdy);

                    if (mDist < 160 && mDist > 0.1) {
                        const prox = 1 - (mDist / 160);
                        const ripplePush = prox * 18; // Soft hydrodynamic push in thick medium
                        el._posX += (mdx / mDist) * ripplePush;
                        el._posY += (mdy / mDist) * ripplePush;
                    }

                    el._renderX += (el._posX - el._renderX) * 0.16;
                    el._renderY += (el._posY - el._renderY) * 0.16;
                    el.style.transform = `translate3d(${el._renderX.toFixed(1)}px, ${el._renderY.toFixed(1)}px, 0) scale(${el._targetScale})`;
                });
            }

            requestAnimationFrame(physicsLoop);
        }
        requestAnimationFrame(physicsLoop);

        // --- INDIVIDUAL DRAGGING & DISINTEGRATION CONTROLLER ---
        let masterTimeline = null;

        function setFissionState(active, isMobileFast = false) {
            if (isFissioned === active) return;
            isFissioned = active;
            entranceCompleted = false;

            if (masterTimeline) masterTimeline.kill();
            masterTimeline = gsap.timeline();

            const origin = getCardCenter();
            const timeMult = isMobileFast ? 0.65 : 1.0;

            if (active) {
                configurePhysicsTargets();
                document.body.classList.add('fission-active');

                // Instant Disintegration Flash
                masterTimeline.to(londonCard, { opacity: 0, duration: 0.1 * timeMult, ease: "power1.out" }, 0);

                itemNodes.forEach((el, idx) => {
                    const elW = el.offsetWidth || 135;
                    const elH = el.offsetHeight || 170;
                    const startX = origin.x - elW / 2;
                    const startY = origin.y - elH / 2;

                    el._renderX = startX; el._renderY = startY;

                    const dx = el._targetX - startX;
                    const dy = el._targetY - startY;
                    const flightDist = Math.sqrt(dx*dx + dy*dy);

                    // Majestic tidal wave insertion flight timing
                    const baseDur = 0.65 + (flightDist / 1200) * 0.33;
                    const dur = baseDur * timeMult;
                    const stagger = ((idx % 4) * 0.03 + Math.random() * 0.02) * timeMult;
                    const proxy = { p: 0 };

                    masterTimeline.to(proxy, {
                        p: 1,
                        duration: dur,
                        ease: "back.out(1.16)",
                        onUpdate: () => {
                            el._renderX = startX + (el._targetX - startX) * proxy.p;
                            el._renderY = startY + (el._targetY - startY) * proxy.p;
                            const currentScale = el._targetScale * proxy.p;
                            el.style.opacity = proxy.p;
                            el.style.transform = `translate3d(${el._renderX.toFixed(1)}px, ${el._renderY.toFixed(1)}px, 0) scale(${currentScale})`;
                        },
                        onComplete: () => {
                            el._posX = el._renderX;
                            el._posY = el._renderY;
                            if (idx === itemNodes.length - 1) entranceCompleted = true;
                        }
                    }, stagger);
                });
            } else {
                document.body.classList.remove('fission-active');

                // Individual natural dragging suction toward card center
                itemNodes.forEach((el, idx) => {
                    const elW = el.offsetWidth || 135;
                    const elH = el.offsetHeight || 170;
                    const targetOriginX = origin.x - elW / 2;
                    const targetOriginY = origin.y - elH / 2;

                    const startX = el._renderX || targetOriginX;
                    const startY = el._renderY || targetOriginY;
                    const startScale = el._targetScale || 1;

                    const dx = startX - targetOriginX;
                    const dy = startY - targetOriginY;
                    const returnDist = Math.sqrt(dx*dx + dy*dy);

                    // Slower, majestic fusion flight timing
                    const baseDur = 0.65 + (returnDist / 1200) * 0.33;
                    const dur = baseDur * timeMult;
                    const stagger = ((idx % 4) * 0.03 + Math.random() * 0.02) * timeMult;
                    const proxy = { p: 1 };

                    masterTimeline.to(proxy, {
                        p: 0,
                        duration: dur,
                        ease: "power3.in",
                        onUpdate: () => {
                            el._renderX = targetOriginX + (startX - targetOriginX) * proxy.p;
                            el._renderY = targetOriginY + (startY - targetOriginY) * proxy.p;
                            el.style.opacity = proxy.p;
                            el.style.transform = `translate3d(${el._renderX.toFixed(1)}px, ${el._renderY.toFixed(1)}px, 0) scale(${startScale * proxy.p})`;
                        }
                    }, stagger);
                });

                masterTimeline.to(londonCard, {
                    opacity: 1,
                    duration: 0.35 * timeMult,
                    ease: "power2.out"
                }, 0.7 * timeMult);
            }
        }

        // --- DESKTOP HOVER ENGINE (> 1100px Landscape) ---
        hitbox.addEventListener('mouseenter', () => { if (!isMobileMode() && !isFissioned) setFissionState(true); });
        stage.addEventListener('mouseleave', () => { if (!isMobileMode() && isFissioned) setFissionState(false); });

        // --- MOBILE & TABLET TOUCH LOCK ENGINE (<= 1100px or Portrait) ---
        function handleMobileDown(e) {
            if (isMobileMode()) {
                if (e && e.cancelable) e.preventDefault();
                setFissionState(true, true);
            }
        }

        function handleMobileUp() {
            if (isMobileMode() && isFissioned) {
                setFissionState(false, true);
            }
        }

        hitbox.addEventListener('pointerdown', handleMobileDown);
        hitbox.addEventListener('touchstart', handleMobileDown, { passive: false });

        window.addEventListener('pointerup', handleMobileUp);
        window.addEventListener('pointercancel', handleMobileUp);
        window.addEventListener('touchend', handleMobileUp);
        window.addEventListener('touchcancel', handleMobileUp);

        window.addEventListener('resize', () => { if (isFissioned) configurePhysicsTargets(); });
    </script>
</body>
