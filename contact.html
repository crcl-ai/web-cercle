<!DOCTYPE html>
<html lang="en">
<head>
<!-- Standard Favicon -->
<link rel="icon" type="image/png" href="photos/favicon.png">
<link rel="shortcut icon" type="image/x-icon" href="photos/favicon.ico">
<link rel="apple-touch-icon" href="photos/apple-touch-icon.png">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>Capsule — Inquiries & Contact</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
    /* --- APPLE GARAMOND TYPOGRAPHY --- */
    @font-face {
        font-family: 'AppleGaramond';
        src: url('apple_garamond/AppleGaramond-Light.ttf') format('truetype');
        font-weight: 300;
        font-style: normal;
    }

    /* --- SYSTEM-ADAPTIVE COLOR SPECIFICATION --- */
    :root {
        --bg-color: #FAFAF8; 
        --text-main: #000000; 
        --text-muted: rgba(0, 0, 0, 0.65);
        --text-faint: rgba(0, 0, 0, 0.35);
        --app-blue: #0A84FF;
        --border-subtle: 1px solid rgba(0, 0, 0, 0.06);
        --card-bg: #FFFFFF;
    }

    @media (prefers-color-scheme: dark) {
        :root {
            --bg-color: #000000; 
            --text-main: #FAFAF8; 
            --text-muted: rgba(250, 250, 248, 0.65);
            --text-faint: rgba(250, 250, 248, 0.35);
            --border-subtle: 1px solid rgba(250, 250, 248, 0.06);
            --card-bg: #111111;
        }
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
    }

    body {
        background-color: var(--bg-color);
        color: var(--text-main);
        font-family: 'Inter', -apple-system, sans-serif;
        overflow-y: auto;
        overflow-x: hidden;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        transition: background-color 0.4s ease, color 0.4s ease;
    }

    /* --- LAYOUT UTILITIES --- */
    .legal-padding {
        padding: 80px 48px 140px 48px;
        max-width: 1200px;
        margin: 0 auto;
        width: 100%;
        flex: 1;
    }

    /* --- NAVIGATION --- */
    .global-nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 24px 32px;
        z-index: 100;
        flex-shrink: 0; 
        border-bottom: var(--border-subtle);
    }
    
    .logo {
        font-family: 'AppleGaramond', Georgia, serif;
        font-size: 2.2rem;
        font-weight: 300;
        letter-spacing: -0.02em; 
        color: var(--text-main);
        text-decoration: none;
        text-transform: capitalize;
    }

    .get-btn {
        background-color: var(--app-blue);
        color: #FFFFFF;
        border: none;
        border-radius: 16px;
        padding: 6px 18px;
        font-size: 0.95rem;
        font-weight: 700;
        text-decoration: none;
        cursor: pointer;
        transition: transform 0.2s ease, opacity 0.2s ease;
    }
    .get-btn:hover { transform: scale(1.05); opacity: 0.9; }

    /* --- EDITORIAL HEADER --- */
    .legal-header {
        margin-bottom: 80px;
        border-bottom: var(--border-subtle);
        padding-bottom: 40px;
    }

    .legal-label {
        font-size: 0.7rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: var(--app-blue);
        margin-bottom: 12px;
        display: block;
    }

    .legal-title {
        font-size: clamp(2.2rem, 5vw, 3.5rem);
        font-weight: 800;
        letter-spacing: -0.04em;
        line-height: 1.1;
        color: var(--text-main);
    }

    /* --- FORM STYLES --- */
    .legal-split {
        display: grid;
        grid-template-columns: 240px 1fr;
        gap: 48px;
        margin-bottom: 72px;
    }

    .section-label {
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--text-faint);
    }

    .form-container {
        max-width: 560px;
        width: 100%;
    }

    .form-group {
        margin-bottom: 28px;
    }

    .form-group label {
        display: block;
        font-size: 0.8rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--text-muted);
        margin-bottom: 8px;
    }

    .form-input {
        width: 100%;
        background-color: var(--card-bg);
        border: var(--border-subtle);
        border-radius: 16px;
        padding: 16px 20px;
        font-family: 'Inter', sans-serif;
        font-size: 1rem;
        color: var(--text-main);
        outline: none;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .form-input:focus {
        border-color: var(--app-blue);
        box-shadow: 0 0 0 3px rgba(10, 132, 255, 0.15);
    }

    textarea.form-input {
        min-height: 160px;
        resize: vertical;
        line-height: 1.5;
    }

    .submit-btn {
        background-color: var(--text-main);
        color: var(--bg-color);
        border: none;
        border-radius: 16px;
        padding: 16px 32px;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        transition: transform 0.2s ease, opacity 0.2s ease;
    }
    .submit-btn:hover {
        opacity: 0.9;
        transform: translateY(-1px);
    }

    /* --- FOOTER --- */
    .stealth-footer {
        padding: 40px 32px; 
        display: flex; 
        justify-content: space-between; 
        align-items: center;
        font-size: 0.75rem; 
        font-weight: 500; 
        letter-spacing: 0.05em;
        text-transform: lowercase;
        border-top: var(--border-subtle);
        background-color: var(--bg-color);
        margin-top: auto;
    }

    .footer-links { display: flex; gap: 32px; }
    .footer-links a, .copyright { color: var(--text-faint); text-decoration: none; transition: color 0.3s ease; }
    .footer-links a:hover { color: var(--text-main); }

    @media (max-width: 768px) {
        .legal-split { grid-template-columns: 1fr; gap: 24px; }
        .section-label { position: static; border-bottom: 1px dashed var(--text-faint); padding-bottom: 8px; }
        .legal-padding { padding: 60px 24px; }
        .stealth-footer { flex-direction: column; gap: 16px; text-align: center; }
    }
</style>

<!-- AI Crawler & Answer Engine Discovery Links (Sandboxed Fetcher Unblockers) -->

<link rel="alternate" type="text/plain" title="LLMs Full Knowledge Base" href="https://capsule.ad/llms-full.txt">
<link rel="author" type="text/plain" title="Robots Rules" href="https://capsule.ad/robots.txt">

</head>
<body>

    <nav class="global-nav">
        <a href="index.html" class="logo">Capsule</a>
        <a href="waitlist.html" class="get-btn">GET</a>
    </nav>

    <main class="legal-padding">
        <header class="legal-header">
            <span class="legal-label">Inquiries</span>
            <h1 class="legal-title">Reach Out</h1>
        </header>

        <div class="legal-split">
            <div class="section-label">Direct Line</div>
            <div class="form-container">
                <form action="mailto:info@sruper.com" method="POST" enctype="text/plain">
                    <div class="form-group">
                        <label for="name">Identity / Name</label>
                        <input class="form-input" type="text" id="name" name="name" required placeholder="Your name">
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Return Channel / Email</label>
                        <input class="form-input" type="email" id="email" name="email" required placeholder="name@domain.com">
                    </div>

                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea class="form-input" id="message" name="message" required placeholder="Share your thoughts or feedback..."></textarea>
                    </div>

                    <button type="submit" class="submit-btn">Send Message</button>
                </form>
            </div>
        </div>
    </main>

    <footer class="stealth-footer">
        <div class="copyright">sruper © 2026</div>
        <div class="footer-links">
            <a href="invest.html">invest</a>
            <a href="terms.html">terms</a>
            <a href="privacy.html">policy</a>
            <a href="contact.html">contact</a>
        </div>
    </footer>

</body>
</html>
